[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Build settings
build_flags = 
    -std=gnu++17
    -Wall
    -Wextra

; Use minimal SPIFFS partition to maximize firmware space
board_build.partitions = min_spiffs.csv

; Embed web UI HTML file into flash as null-terminated text (see web_ui.h)
board_build.embed_txtfiles = src/web_ui.html

; Libraries — pin exact versions (no ^) so PIO doesn't re-resolve/reinstall
; on every build. See CLAUDE.md "PlatformIO / VSCode extension" section.
lib_deps =
    madhephaestus/ESP32Servo@3.0.9
    adafruit/Adafruit PWM Servo Driver Library@3.0.2
    me-no-dev/ESPAsyncWebServer@1.2.4
    me-no-dev/AsyncTCP@1.1.1
    bblanchon/ArduinoJson@7.4.1

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600
