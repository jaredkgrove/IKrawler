<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>IKrawler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:#0a0a0f;color:#e0e0e8;
  touch-action:none;user-select:none;-webkit-user-select:none;
}

.app{
  display:flex;flex-direction:column;height:100%;
  background:radial-gradient(ellipse at 50% 0%,#1a1a2e 0%,#0a0a0f 70%);
}

/* ── Header ── */
header{
  text-align:center;padding:12px 0 4px;flex-shrink:0;
}
header h1{
  font-size:1.3rem;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,#00d4ff,#7b2ff7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.status{
  font-size:0.7rem;margin-top:2px;color:#666;transition:color .3s;
}
.status.connected{color:#00e676}
.status.connecting{color:#ffab00}
.status.disconnected{color:#ff1744}

/* ── Joystick area ── */
.joystick-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;min-height:200px;
}
.joystick-label{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:0.65rem;color:#444;letter-spacing:1px;text-transform:uppercase;
}

/* ── Info bar ── */
.info-bar{
  display:flex;justify-content:center;gap:24px;
  padding:4px 0;font-size:0.7rem;color:#555;flex-shrink:0;
}
.info-bar span{font-variant-numeric:tabular-nums}

/* ── Buttons ── */
.buttons{
  display:grid;grid-template-columns:repeat(6,1fr);gap:6px;
  padding:10px 12px 20px;flex-shrink:0;
}
.btn{
  padding:14px 0;border:none;border-radius:12px;cursor:pointer;
  font-size:0.85rem;font-weight:600;letter-spacing:0.5px;
  transition:all .15s ease;position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);pointer-events:none;
}
.btn:active{transform:scale(0.95)}

.btn-stand{
  background:linear-gradient(135deg,#1a3a1a,#0d260d);color:#4caf50;
}
.btn-walk{
  background:linear-gradient(135deg,#1a2a3a,#0d1a26);color:#2196f3;
}
.btn-rest{
  background:linear-gradient(135deg,#3a2a1a,#261a0d);color:#ff9800;
}
.btn-stop{
  background:linear-gradient(135deg,#3a1a1a,#260d0d);color:#f44336;
}

/* ── Leg Identify Buttons ── */
.leg-buttons{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
  padding:0 16px 10px;flex-shrink:0;
}
.btn-leg{
  padding:10px 0;border:none;border-radius:8px;cursor:pointer;
  font-size:0.75rem;font-weight:600;letter-spacing:0.5px;
  background:linear-gradient(135deg,#2a2a35,#1a1a2e);color:#aaa;
  transition:all .15s ease;position:relative;overflow:hidden;
}
.btn-leg::before{
  content:'';position:absolute;inset:0;border-radius:8px;
  border:1px solid rgba(255,255,255,0.08);pointer-events:none;
}
.btn-leg:active{transform:scale(0.95);background:#334}

.btn-cal{
  background:linear-gradient(135deg,#2a1a3a,#1a0d26);color:#ba68c8;
}
.btn-test{
  background:linear-gradient(135deg,#1a3a3a,#0d2626);color:#26c6da;
}

/* ── Calibration Panel ── */
.cal-panel,.test-panel{
  position:fixed;inset:0;background:rgba(10,10,15,0.97);z-index:1000;
  display:none;flex-direction:column;padding:12px;overflow-y:auto;
  padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
}
.cal-panel.open,.test-panel.open{display:flex}
.cal-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;flex-shrink:0;
}
.cal-header h2{
  font-size:1rem;font-weight:600;letter-spacing:1px;color:#ba68c8;
}
.cal-actions{display:flex;gap:6px}
.cal-actions button{
  padding:6px 10px;border:none;border-radius:6px;cursor:pointer;
  font-size:0.7rem;font-weight:600;color:#e0e0e8;
}
.cal-actions .cal-save{background:#1a3a1a;color:#4caf50}
.cal-actions .cal-reset{background:#3a2a1a;color:#ff9800}
.cal-actions .cal-close{background:#2a2a35}
.cal-save-status{
  font-size:0.7rem;margin-left:8px;color:#666;
  transition:opacity .3s;opacity:0;
}
.cal-save-status.ok{color:#4caf50;opacity:1}
.cal-save-status.err{color:#f44336;opacity:1}

.cal-leg{
  background:#15151f;border-radius:8px;padding:8px;margin-bottom:8px;
}
.cal-leg-label{
  font-size:0.7rem;color:#888;letter-spacing:1px;margin-bottom:6px;
  text-transform:uppercase;
}
.cal-joints{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cal-joint{
  background:#0d0d14;border-radius:6px;padding:6px;text-align:center;
}
.cal-joint-label{
  font-size:0.6rem;color:#666;letter-spacing:0.5px;
  text-transform:uppercase;margin-bottom:4px;
}
.cal-joint-value{
  font-size:0.85rem;font-weight:600;color:#e0e0e8;
  font-variant-numeric:tabular-nums;margin-bottom:4px;
}
.cal-joint-controls{display:flex;gap:3px;justify-content:center}
.cal-btn{
  width:26px;height:26px;border:none;border-radius:4px;cursor:pointer;
  background:#2a2a35;color:#ba68c8;font-size:0.8rem;font-weight:700;
  touch-action:manipulation;
}
.cal-btn:active{background:#3a3a45;transform:scale(0.9)}
.cal-btn.big{font-size:0.7rem}

/* ── Joint Test Panel ── */
.test-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;flex-shrink:0;
}
.test-header h2{
  font-size:1rem;font-weight:600;letter-spacing:1px;color:#26c6da;
}
.test-hint{
  font-size:0.7rem;color:#666;margin-bottom:10px;line-height:1.4;
}
.test-leg{
  background:#15151f;border-radius:8px;padding:8px;margin-bottom:8px;
}
.test-leg-label{
  font-size:0.7rem;color:#888;letter-spacing:1px;margin-bottom:6px;
  text-transform:uppercase;
}
.test-joints{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.test-joint-btn{
  padding:12px 0;border:none;border-radius:6px;cursor:pointer;
  font-size:0.75rem;font-weight:600;letter-spacing:0.5px;
  background:#2a2a35;color:#26c6da;touch-action:manipulation;
}
.test-joint-btn:active{background:#3a3a45;transform:scale(0.95)}

/* Safe-area padding for notched phones */
@supports(padding-bottom: env(safe-area-inset-bottom)){
  .buttons{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>IKrawler</h1>
    <div class="status disconnected" id="status">Disconnected</div>
  </header>

  <div class="joystick-area" id="joystick-zone">
    <div class="joystick-label">drag to move</div>
  </div>

  <div class="info-bar">
    <span id="info-heading">HDG 0°</span>
    <span id="info-turn">TRN 0.00</span>
    <span id="info-stride">STR 0.00</span>
  </div>

  <div class="leg-buttons">
    <button class="btn btn-leg" onclick="sendAction('identify_5')">L5 (FL)</button>
    <button class="btn btn-leg" onclick="sendAction('identify_0')">L0 (FR)</button>
    <button class="btn btn-leg" onclick="sendAction('identify_4')">L4 (ML)</button>
    <button class="btn btn-leg" onclick="sendAction('identify_1')">L1 (MR)</button>
    <button class="btn btn-leg" onclick="sendAction('identify_3')">L3 (RL)</button>
    <button class="btn btn-leg" onclick="sendAction('identify_2')">L2 (RR)</button>
  </div>

  <div class="buttons">
    <button class="btn btn-stand" ontouchstart="" onclick="sendAction('stand')">Stand</button>
    <button class="btn btn-walk"  ontouchstart="" onclick="sendAction('walk')">Walk</button>
    <button class="btn btn-rest"  ontouchstart="" onclick="sendAction('rest')">Rest</button>
    <button class="btn btn-stop"  ontouchstart="" onclick="sendAction('stop')">Stop</button>
    <button class="btn btn-cal"   ontouchstart="" onclick="openCal()">Cal</button>
    <button class="btn btn-test"  ontouchstart="" onclick="openTest()">Test</button>
  </div>
</div>

<!-- Joint Test Panel -->
<div class="test-panel" id="test-panel">
  <div class="test-header">
    <h2>JOINT TEST</h2>
    <div class="cal-actions">
      <button class="cal-close" onclick="closeTest()">Close</button>
    </div>
  </div>
  <div class="test-hint">
    Robot must be STANDING. Tap a joint to sweep it ±15°.<br>
    Watch the leg and compare to the expected direction printed on serial.
  </div>
  <div id="test-legs"></div>
</div>

<!-- Calibration Panel -->
<div class="cal-panel" id="cal-panel">
  <div class="cal-header">
    <h2>CALIBRATION
      <span class="cal-save-status" id="cal-save-status"></span>
    </h2>
    <div class="cal-actions">
      <button class="cal-reset" onclick="calReset()">Reset</button>
      <button class="cal-save" onclick="calSave()">Save</button>
      <button class="cal-close" onclick="closeCal()">Close</button>
    </div>
  </div>
  <div id="cal-legs"></div>
</div>

<script>
(function(){
  // ── WebSocket ──
  var ws, reconnectTimer;
  var statusEl = document.getElementById('status');
  var infoH = document.getElementById('info-heading');
  var infoT = document.getElementById('info-turn');
  var infoS = document.getElementById('info-stride');

  function connect(){
    statusEl.textContent='Connecting…';
    statusEl.className='status connecting';
    ws = new WebSocket('ws://'+location.host+'/ws');

    ws.onopen = function(){
      statusEl.textContent='Connected';
      statusEl.className='status connected';
      clearTimeout(reconnectTimer);
    };
    ws.onclose = function(){
      statusEl.textContent='Disconnected';
      statusEl.className='status disconnected';
      reconnectTimer = setTimeout(connect, 2000);
    };
    ws.onerror = function(){ws.close()};
    ws.onmessage = function(evt){
      try {
        var msg = JSON.parse(evt.data);
        if (msg.type === 'cal_state' && Array.isArray(msg.offsets)) {
          calOffsets = msg.offsets.slice();
          renderCalValues();
        } else if (msg.type === 'cal_saved') {
          showSaveStatus(msg.ok ? 'Saved' : 'Save failed', msg.ok);
        }
      } catch(e){}
    };
  }
  connect();

  function send(obj){
    if(ws && ws.readyState===1) ws.send(JSON.stringify(obj));
  }

  // ── Action buttons ──
  window.sendAction = function(cmd){
    send({type:'action',cmd:cmd});
  };

  // ── Calibration ──
  var NUM_SERVOS = 18;
  var LEG_NAMES = ['FR','MR','RR','RL','ML','FL'];
  var JOINT_NAMES = ['Coxa','Femur','Tibia'];
  var calOffsets = new Array(NUM_SERVOS).fill(0);
  var calPanel = document.getElementById('cal-panel');
  var calLegsEl = document.getElementById('cal-legs');
  var calSaveStatus = document.getElementById('cal-save-status');

  function buildCalUI(){
    var html = '';
    for (var leg = 0; leg < 6; leg++){
      html += '<div class="cal-leg"><div class="cal-leg-label">Leg '+leg+' — '+LEG_NAMES[leg]+'</div><div class="cal-joints">';
      for (var joint = 0; joint < 3; joint++){
        var servo = leg * 3 + joint;
        html += '<div class="cal-joint">'
          + '<div class="cal-joint-label">'+JOINT_NAMES[joint]+'</div>'
          + '<div class="cal-joint-value" id="cal-val-'+servo+'">0.0°</div>'
          + '<div class="cal-joint-controls">'
          + '<button class="cal-btn big" ontouchstart="" onclick="calAdjust('+servo+',-5)">−5</button>'
          + '<button class="cal-btn" ontouchstart="" onclick="calAdjust('+servo+',-1)">−</button>'
          + '<button class="cal-btn" ontouchstart="" onclick="calAdjust('+servo+',1)">+</button>'
          + '<button class="cal-btn big" ontouchstart="" onclick="calAdjust('+servo+',5)">+5</button>'
          + '</div></div>';
      }
      html += '</div></div>';
    }
    calLegsEl.innerHTML = html;
  }
  buildCalUI();

  function renderCalValues(){
    for (var i = 0; i < NUM_SERVOS; i++){
      var el = document.getElementById('cal-val-'+i);
      if (el) el.textContent = calOffsets[i].toFixed(1) + '°';
    }
  }

  function showSaveStatus(text, ok){
    calSaveStatus.textContent = text;
    calSaveStatus.className = 'cal-save-status ' + (ok ? 'ok' : 'err');
    setTimeout(function(){
      calSaveStatus.className = 'cal-save-status';
    }, 2000);
  }

  window.openCal = function(){
    send({type:'action',cmd:'stand'}); // ensure robot is in a visible pose
    send({type:'cal_get'});
    calPanel.classList.add('open');
  };
  window.closeCal = function(){
    calPanel.classList.remove('open');
  };

  // ── Joint Test ──
  var testPanel = document.getElementById('test-panel');
  var testLegsEl = document.getElementById('test-legs');

  function buildTestUI(){
    var html = '';
    for (var leg = 0; leg < 6; leg++){
      html += '<div class="test-leg"><div class="test-leg-label">Leg '+leg+' — '+LEG_NAMES[leg]+'</div><div class="test-joints">';
      for (var joint = 0; joint < 3; joint++){
        html += '<button class="test-joint-btn" ontouchstart="" '
          + 'onclick="sendTest('+leg+','+joint+')">'
          + JOINT_NAMES[joint] + '</button>';
      }
      html += '</div></div>';
    }
    testLegsEl.innerHTML = html;
  }
  buildTestUI();

  window.sendTest = function(leg, joint){
    send({type:'action', cmd:'test_'+leg+'_'+joint});
  };
  window.openTest = function(){
    send({type:'action',cmd:'stand'}); // required for the test to run
    testPanel.classList.add('open');
  };
  window.closeTest = function(){
    testPanel.classList.remove('open');
  };
  window.calAdjust = function(servo, delta){
    var next = Math.round((calOffsets[servo] + delta) * 10) / 10;
    if (next > 30) next = 30;
    if (next < -30) next = -30;
    calOffsets[servo] = next;
    renderCalValues(); // optimistic update
    send({type:'cal_set', servo:servo, offset:next});
  };
  window.calSave = function(){
    send({type:'cal_save'});
  };
  window.calReset = function(){
    send({type:'cal_reset'});
  };

  // ── Joystick ──
  var joystick = nipplejs.create({
    zone: document.getElementById('joystick-zone'),
    mode: 'static',
    position: {left:'50%', top:'50%'},
    color: 'rgba(255,255,255,0.15)',
    size: 150
  });

  var moveInterval = null;
  var currentHeading = 0;
  var currentTurn = 0;
  var currentStride = 0;

  // Map joystick angle (0°=right, 90°=down in screen coords)
  // to robot heading (0°=forward, positive=left)
  function joystickToRobot(angleDeg, force){
    // nipplejs: 0°=right, 90°=down, 180°=left, 270°=up
    // robot:    0°=forward, 90°=left, -90°=right
    // "up" on screen (270° in nipplejs) = forward (0° robot)
    var robotHeading = -(angleDeg - 270);
    // Normalize to -180..180
    while(robotHeading > 180) robotHeading -= 360;
    while(robotHeading < -180) robotHeading += 360;

    // Force → stride length (0.02 to 0.06 meters)
    var stride = 0.02 + force * 0.04;

    // Extract turn component from left/right bias
    // If pointing mostly left/right with high force, add turn
    var turnComponent = Math.sin(angleDeg * Math.PI / 180) * force * 0.0;
    // Actually, use the x-component of the vector for turn
    // We'll compute this from the raw angle
    var rad = angleDeg * Math.PI / 180;
    var xComp = Math.cos(rad); // positive = right in screen
    // A rightward lean = negative turn (turn right)
    var turn = -xComp * force * 0.5;

    return {heading: Math.round(robotHeading), turn: parseFloat(turn.toFixed(2)), stride: parseFloat(stride.toFixed(3))};
  }

  joystick.on('move', function(evt, data){
    if(!data || !data.angle) return;
    var r = joystickToRobot(data.angle.degree, data.force);
    currentHeading = r.heading;
    currentTurn = r.turn;
    currentStride = r.stride;

    infoH.textContent = 'HDG ' + r.heading + '\u00B0';
    infoT.textContent = 'TRN ' + r.turn.toFixed(2);
    infoS.textContent = 'STR ' + r.stride.toFixed(3);

    // Send move commands at ~20Hz (not on every move event)
    if(!moveInterval){
      sendMove();
      moveInterval = setInterval(sendMove, 50);
    }
  });

  joystick.on('end', function(){
    clearInterval(moveInterval);
    moveInterval = null;
    currentHeading = 0; currentTurn = 0; currentStride = 0;
    send({type:'move', heading:0, turn:0, stride:0});
    infoH.textContent = 'HDG 0\u00B0';
    infoT.textContent = 'TRN 0.00';
    infoS.textContent = 'STR 0.000';
  });

  function sendMove(){
    send({type:'move', heading:currentHeading, turn:currentTurn, stride:currentStride});
  }
})();
</script>
</body>
</html>
